    <style>

    <script>
        const SUPA_URL = "https://chsuqecaqhnjqmmuwfhl.supabase.co";
        const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoc3VxZWNhcWhuanFtbXV3ZmhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDQ4NDMsImV4cCI6MjA4ODAyMDg0M30.CRMlqol-pl3DSBSBvpm04PLkSjE9lja3c1JnKnLrWvs";
        const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

        let activeUser = null;
        let currentFisa = null;

        function getRoTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }
        function formatRelativ(dateStr) {
    if (!dateStr) return "Recent";
    const dataModificarii = new Date(dateStr);
    const acum = new Date();
    const difSecunde = Math.floor((acum - dataModificarii) / 1000);

    if (difSecunde < 60) return "Chiar acum";
    const minute = Math.floor(difSecunde / 60);
    if (minute < 60) return `Acum ${minute}m`;
    const ore = Math.floor(minute / 60);
    if (ore < 24) return `Acum ${ore}h`;
    
    return dataModificarii.toLocaleDateString('ro-RO', { day: '2-digit', month: '2-digit' });
}

        window.onload = () => {
            const saved = localStorage.getItem('geeli_session');
            if (saved) {
                const creds = JSON.parse(saved);
                handleLogin(creds.u, creds.p);
            }
        };

        function showAuth(type) {
            document.getElementById('login-form').classList.toggle('hidden', type !== 'login');
            document.getElementById('reg-form').classList.toggle('hidden', type !== 'reg');
            document.getElementById('reset-form').classList.toggle('hidden', type !== 'reset');
        }

        async function handleLogin(storedU = null, storedP = null) {
            const u = (storedU || document.getElementById('l-user').value).trim();
            const p = (storedP || document.getElementById('l-pass').value).trim();
            const remember = document.getElementById('l-remember').checked;
            if(!u || !p) return;
            const { data } = await _supa.from('profiles').select('*').ilike('username', u).eq('password', p).maybeSingle();
            if (data) {
                activeUser = data;
                if (remember) localStorage.setItem('geeli_session', JSON.stringify({u, p}));
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                document.getElementById('nav-user-name').innerText = data.nume_complet;
                document.getElementById('nav-user-info').innerText = `${data.rol} | ${data.service}`;
                if(data.rol === 'admin') {
                    document.getElementById('btn-add').classList.remove('hidden');
                    document.getElementById('btn-users').classList.remove('hidden');
                }
                document.getElementById('c-data-auto').value = getRoTime();
                const hRow = document.getElementById('table-head-row');
                
hRow.innerHTML = (activeUser.rol === 'admin' ? '<th class="p-4 border-r border-slate-400">#</th>' : '') + `
    <th class="p-4 border-r border-slate-400">ID Fișă</th>
    <th class="p-4 border-r border-slate-400">Client / Telefon</th>
    <th class="p-4 border-r border-slate-400">Produs / VIN</th>
    <th class="p-4 border-r border-slate-400 text-slate-900">Actualizat</th>
    <th class="p-4 border-r border-slate-400">Vechime</th>
    <th class="p-4 border-r border-slate-400">Status</th>
    <th class="p-4 border-r border-slate-400">Service</th>` + 
    ((activeUser.rol === 'admin' || activeUser.service === 'RIDICARE') ? '<th class="p-4">Transport</th>' : '');
               
    loadFise();
            } else { 
                if(!storedU) alert("Date incorecte!"); 
                else localStorage.removeItem('geeli_session');
            }
        }

        async function handleResetPassword() {
            const u = document.getElementById('reset-user').value.trim();
            const oldP = document.getElementById('reset-old-pass').value.trim();
            const newP = document.getElementById('reset-new-pass').value.trim();
            if(!u || !oldP || !newP) return alert("Completați toate datele!");
            const { data: profile } = await _supa.from('profiles').select('id').ilike('username', u).eq('password', oldP).maybeSingle();
            if (profile) {
                await _supa.from('profiles').update({ password: newP }).eq('id', profile.id);
                alert("Parola a fost actualizată!");
                showAuth('login');
            } else alert("Utilizator sau parolă incorectă!");
        }

        function handleLogout() {
    localStorage.removeItem('geeli_session');
    window.location.href = "https://geelie.github.io/mobil/";
        }

        async function handleRegister() {
            const nume = document.getElementById('r-full').value.trim();
            const user = document.getElementById('r-user').value.trim();
            const pass = document.getElementById('r-pass').value.trim();
            const serv = document.getElementById('r-service').value;
            if (!nume || !user || !pass) return alert("Toate câmpurile sunt obligatorii!");
            const profile = {
                nume_complet: nume,
                username: user,
                password: pass,
                service: serv,
                rol: (user.toLowerCase().includes('admin')) ? 'admin' : 'none'
            };
            const { error } = await _supa.from('profiles').insert([profile]);
            if (error) alert("Eroare: " + error.message);
            else {
                alert("Cont creat! Așteptați activarea.");
                showAuth('login');
            }
        }

        async function loadUsers() {
            if(activeUser.rol !== 'admin') return;
            const { data } = await _supa.from('profiles').select('*').order('nume_complet');
            const body = document.getElementById('users-rows');
            body.innerHTML = '';
            data?.forEach(u => {
                body.innerHTML += `<tr class="border-b border-slate-100 hover:bg-slate-50">
                    <td class="p-4 font-black text-slate-900">${u.nume_complet}</td>
                    <td class="p-4 font-mono font-bold text-blue-600">${u.username}</td>
                    <td class="p-4 text-xs font-bold text-slate-700">${u.service}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[9px] font-black uppercase text-white 
                        ${u.rol === 'admin' ? 'bg-red-600' : (u.rol === 'user' ? 'bg-green-600' : 'bg-slate-500')}">
                        ${u.rol || 'none'}
                        </span>
                    </td>
                    <td class="p-4 text-center flex gap-2 justify-center">

        function calcVechime(dateStr) {
            if(!dateStr) return { text: "-", color: "text-slate-400" };
            const diff = Math.floor((new Date() - new Date(dateStr)) / 86400000);
            return {
                text: diff <= 14 ? `${diff} ZILE (OK)` : `${diff} ZILE (DEPĂȘIT)`,
                color: diff <= 14 ? "text-green-700" : "text-red-700"
            };
        }

        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('border-b-4', 'border-blue-600', 'text-blue-600'));
            let btnId = (id === 'tab-add') ? 'btn-add' : ((id === 'tab-users') ? 'btn-users' : 'btn-list');
            if(id === 'tab-add' && !document.getElementById('edit-fisa-id').value) document.getElementById('c-data-auto').value = getRoTime();
            if(id === 'tab-users') loadUsers();
            document.getElementById(btnId).classList.add('border-b-4', 'border-blue-600', 'text-blue-600');
            window.scrollTo(0,0);
        }

        function closeModal() { document.getElementById('modal-view').classList.add('hidden'); }
        function filterTable() {
            const q = document.getElementById('search-box').value.toLowerCase();
            document.querySelectorAll('#fise-rows tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        function toggleExportDates() {
            const type = document.getElementById('export-type').value;
            document.getElementById('export-dates').classList.toggle('hidden', type !== 'period');
        }

        async function exportToExcel() {
            const type = document.getElementById('export-type').value;
            let query = _supa.from('fise').select('*').order('created_at', { ascending: true });

            if (type === 'period') {
                const start = document.getElementById('exp-start').value;
                const end = document.getElementById('exp-end').value;
                if (!start || !end) return alert("Selectați perioada!");
                query = query.gte('created_at', start + "T00:00").lte('created_at', end + "T23:59");
            }

            const { data, error } = await query;
            if (error || !data.length) return alert("Nu există date de exportat!");

            const rows = data.map((f, idx) => ({
                "Nr. Crt": idx + 1,
                "ID Fisa": f.id,
                "Data Inregistrare": f.created_at ? (() => {
    const parts = f.created_at.substring(0, 10).split('-');
    const time = f.created_at.substring(11, 19);
    return `${parts[2]}-${parts[1]}-${parts[0]} ${time}`;
})() : '',
                "Nume Client": f.nume_client,
                "Telefon": f.tel_client,
                "Email": f.email_client,
                "Adresa": f.adresa_client,
                "Categorie": f.categorie,
                "Marca/Model": f.marca_model,
                "VIN": f.vin_produs,
                "Nr Factura": f.nr_factura,
                "Data Factura": f.data_factura ? f.data_factura.split('-').reverse().join('-') : '',
                "Tip Garantie": f.tip_garantie,
                "Observatii Produs": f.obs_produs,
                "Data Preluare Fizica": f.data_preluare_fizica ? f.data_preluare_fizica.split('-').reverse().join('-') : '',
                "Reclamatie Client": f.reclamatie_client,
                "Status": f.status,
                "Alocat Catre": f.alocat_catre,
                "Tehnician": f.tehnician,
                "KM/Ore": f.km || '',
                "Cost": f.cost || '',
                "Raport Tehnic": f.raport_reparatie
            }));

            const worksheet = XLSX.utils.json_to_sheet(rows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Fise Service");

            // Auto-size coloane
            const max_width = rows.reduce((w, r) => Math.max(w, r["Nume Client"].length), 10);
            worksheet["!cols"] = [ { wch: 8 }, { wch: 12 }, { wch: 20 }, { wch: 25 } ];

            XLSX.writeFile(workbook, `Export_Geeli_Service_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
